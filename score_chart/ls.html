    chart.resize();
  }
});

// Landscape lock detection for mobile
(function() {
  var overlay = document.getElementById('rotate-overlay');
  function checkOrientation() {
    if (window.innerWidth <= 768) {
      var isPortrait = window.innerHeight > window.innerWidth;
      overlay.style.display = isPortrait ? 'flex' : 'none';
      document.body.style.overflow = isPortrait ? 'hidden' : '';
      if (!isPortrait) chart.resize();
    } else {
      overlay.style.display = 'none';
      document.body.style.overflow = '';
    }
  }
  window.addEventListener('resize', checkOrientation);
  checkOrientation();
  // Try to force landscape via screen.orientation API (Android browsers)
  if (typeof screen !== 'undefined' && screen.orientation && screen.orientation.lock) {
    screen.orientation.lock('landscape').catch(function(){});
  }
})();
